# =============================================================================
# Kubernetes Secret — Postgres Credentials
# =============================================================================
#
# HOW TO USE:
#
#   Option A — Apply as-is (base64 encoded values below are "postgres"):
#     kubectl apply -f secrets.yaml
#
#   Option B — Use your own password (RECOMMENDED for production on EC2):
#     1. Generate base64 value:
#          echo -n "your-strong-password" | base64
#     2. Replace the 'cG9zdGdyZXM=' values below with your output.
#     3. kubectl apply -f secrets.yaml
#
#   Option C — Use kubectl to create from literal (no YAML editing needed):
#     kubectl create secret generic postgres-secret \
#       --from-literal=POSTGRES_USER=postgres \
#       --from-literal=POSTGRES_PASSWORD=your-strong-password \
#       --from-literal=POSTGRES_DB=postgres \
#       --from-literal=DATABASE_URL="postgres://postgres:your-strong-password@db/postgres"
#
# =============================================================================
#
# SECRETS IN THIS FILE:
#
#   POSTGRES_USER     — PostgreSQL username              (default: postgres)
#   POSTGRES_PASSWORD — PostgreSQL password              (default: postgres)
#   POSTGRES_DB       — PostgreSQL database name         (default: postgres)
#   DATABASE_URL      — Full connection URL for result   (default: postgres://postgres:postgres@db/postgres)
#   PGHOST            — Hostname for worker              (default: db)
#   PGUSER            — Username for worker              (default: postgres)
#   PGPASSWORD        — Password for worker              (default: postgres)
#   PGDATABASE        — Database name for worker         (default: postgres)
#   REDIS_HOST        — Redis hostname for worker        (default: redis)
#
# =============================================================================
#
# NOTE: The base64 values below correspond to the plaintext defaults.
#       To decode and verify any value:
#         echo "cG9zdGdyZXM=" | base64 --decode   → prints "postgres"
#
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
data:
  # "postgres" in base64
  POSTGRES_USER: cG9zdGdyZXM=
  # "postgres" in base64  ← CHANGE THIS for production!
  POSTGRES_PASSWORD: cG9zdGdyZXM=
  # "postgres" in base64
  POSTGRES_DB: cG9zdGdyZXM=
  # "postgres://postgres:postgres@db/postgres" in base64
  DATABASE_URL: cG9zdGdyZXM6Ly9wb3N0Z3Jlczpwb3N0Z3Jlc0BkYi9wb3N0Z3Jlcw==
  # "db" in base64
  PGHOST: ZGI=
  # "postgres" in base64
  PGUSER: cG9zdGdyZXM=
  # "postgres" in base64  ← CHANGE THIS for production!
  PGPASSWORD: cG9zdGdyZXM=
  # "postgres" in base64
  PGDATABASE: cG9zdGdyZXM=
  # "redis" in base64
  REDIS_HOST: cmVkaXM=
